# Despliega el contenido de dist/ a GitHub Pages (no uses "branch main / root" con el código fuente).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Debe coincidir con la URL: https://<usuario>.github.io/<nombre-repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm run build
          echo "{\"viteBase\":\"$VITE_BASE_PATH\",\"repo\":\"${{ github.event.repository.name }}\"}" > dist/build-info.json

      - name: Comprobar rutas en index.html (debe ser /${{ github.event.repository.name }}/assets/…)
        run: |
          grep -E 'src="/${{ github.event.repository.name }}/assets/' dist/index.html || (echo "ERROR: index.html no usa la base esperada"; head -30 dist/index.html; exit 1)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
